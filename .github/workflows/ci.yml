name: PhysicsBox CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build lean image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          build-args: BUILD=lean
          load: true
          tags: physicsbox:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test — Python imports
        run: |
          docker run --rm physicsbox:ci \
            conda run -n physicsbox python -c "
          import numpy, scipy, matplotlib
          print('✓ numpy', numpy.__version__)
          print('✓ scipy', scipy.__version__)
          print('✓ matplotlib', matplotlib.__version__)
          "

      - name: Test — GCC and GSL
        run: |
          docker run --rm physicsbox:ci bash -c "
          gcc --version | head -1
          gsl-config --version
          echo '✓ GCC and GSL OK'
          "

      - name: Test — GSL compile and run
        run: |
          docker run --rm physicsbox:ci bash -c "
          cat > /tmp/test_gsl.c << 'CSRC'
          #include <stdio.h>
          #include <gsl/gsl_math.h>
          int main() {
            printf(\"GSL pi = %.10f\n\", M_PI);
            return 0;
          }
          CSRC
          gcc /tmp/test_gsl.c -o /tmp/test_gsl \$(gsl-config --cflags --libs)
          /tmp/test_gsl
          echo '✓ GSL compile and run OK'
          "

      - name: Test — gnuplot and epstopdf
        run: |
          docker run --rm physicsbox:ci bash -c "
          gnuplot --version
          epstopdf --version
          echo '✓ gnuplot and epstopdf OK'
          "

      - name: Test — conda package integrity
        run: |
          docker run --rm physicsbox:ci bash -c "
          VARIANT=\$(cat /etc/physicsbox/build_variant)
          echo \"Build variant: \$VARIANT\"
          conda run -n physicsbox conda list --no-pip -q \
            | awk 'NR>3 {print \$1}' > /tmp/installed.txt
          conda run -n physicsbox python -c \"
          import yaml
          with open('/etc/physicsbox/environment.lean.yml') as f:
              env = yaml.safe_load(f)
          deps = [d.split('=')[0] for d in env.get('dependencies', [])
                  if isinstance(d, str) and d != 'pip']
          print('\n'.join(deps))
          \" > /tmp/expected.txt
          MISSING=()
          while IFS= read -r pkg; do
            [ -z \"\$pkg\" ] && continue
            if ! grep -qi \"^\${pkg}\$\" /tmp/installed.txt; then
              MISSING+=(\"\$pkg\")
            fi
          done < /tmp/expected.txt
          if [ \${#MISSING[@]} -gt 0 ]; then
            echo \"✗ Missing packages: \${MISSING[*]}\"
            exit 1
          fi
          echo '✓ All expected packages installed'
          "