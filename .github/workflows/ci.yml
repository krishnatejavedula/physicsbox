name: PhysicsBox CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build lean image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          build-args: BUILD=lean
          load: true
          tags: physicsbox:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test — Python imports
        run: docker run --rm physicsbox:ci bash /opt/physicsbox/tests/test_python.sh

      - name: Test — C toolchain and GSL
        run: docker run --rm physicsbox:ci bash /opt/physicsbox/tests/test_c.sh

      - name: Test — conda package integrity
        run: docker run --rm physicsbox:ci bash /opt/physicsbox/tests/test_packages.sh